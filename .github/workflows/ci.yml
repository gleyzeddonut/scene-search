name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        # The GUI-free core (which is all the tests cover) needs only these;
        # PySide6 is not imported by the test suite.
        run: |
          python -m pip install --upgrade pip
          pip install pypdf python-docx Send2Trash pytest

      - name: Run tests
        run: pytest -q
