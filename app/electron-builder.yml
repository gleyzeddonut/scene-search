appId: com.gleyzer.scripty
productName: Scripty
publish:
  provider: github
  owner: gleyzeddonut
  repo: scene-search
  releaseType: release
directories:
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../dist-engine/arm64/scripty-engine
    to: engine-arm64
  - from: ../dist-engine/x64/scripty-engine
    to: engine-x64
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: "Daniel Gleyzer (K7VM2MP885)"
  target:
    - dmg
    - zip
afterSign: scripts/notarize.cjs
