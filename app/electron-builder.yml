appId: com.gleyzer.scripty
productName: Scripty
publish:
  provider: github
  owner: gleyzeddonut
  repo: scene-search
  releaseType: release
directories:
  buildResources: build
files:
  - out/**/*
  - package.json
# NOTE (Read-with-me voice stack, currently parked): when re-enabling Kokoro TTS,
# move kokoro-js back to "dependencies" AND restore:
#   asarUnpack:
#     - "**/node_modules/onnxruntime-node/**"
# (native onnx binaries can't load from inside the asar)
extraResources:
  - from: resources/scripty-ocr # universal macOS OCR helper (built by build_app.sh)
    to: scripty-ocr
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: "Daniel Gleyzer (K7VM2MP885)"
  extendInfo:
    NSDesktopFolderUsageDescription: Scripty searches this folder for your script files.
    NSDocumentsFolderUsageDescription: Scripty searches this folder for your script files.
    NSDownloadsFolderUsageDescription: Scripty searches this folder for your script files.
    NSRemovableVolumesUsageDescription: Scripty searches connected drives for your script files.
  target:
    - dmg
    - zip
afterSign: scripts/notarize.cjs
