appId: com.gleyzer.scripty
productName: Scripty
publish:
  provider: github
  owner: gleyzeddonut
  repo: scene-search
  releaseType: release
directories:
  buildResources: build
files:
  - out/**/*
  - package.json
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: "Daniel Gleyzer (K7VM2MP885)"
  extendInfo:
    NSDesktopFolderUsageDescription: Scripty searches this folder for your script files.
    NSDocumentsFolderUsageDescription: Scripty searches this folder for your script files.
    NSDownloadsFolderUsageDescription: Scripty searches this folder for your script files.
    NSRemovableVolumesUsageDescription: Scripty searches connected drives for your script files.
  target:
    - dmg
    - zip
afterSign: scripts/notarize.cjs
