<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Scripty</title>
    <script>
      // resolve the saved theme before first paint so the boot splash matches
      try {
        var t = localStorage.getItem('theme') || 'system'
        var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
        // a Quick Look pop-out window shouldn't show the launch splash
        if (location.search.indexOf('quicklook') >= 0) document.documentElement.classList.add('ql')
      } catch (e) {}
    </script>
    <style>
      /* self-contained boot splash — paints before the JS bundle loads, then
         React's identical splash overlay takes over seamlessly */
      html, body { height: 100%; margin: 0 }
      html.ql #boot { display: none } /* no launch splash in the Quick Look pop-out */
      #boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: oklch(0.997 0.001 270); font-family: 'Space Grotesk', -apple-system, sans-serif;
      }
      html[data-theme='dark'] #boot { background: oklch(0.185 0.012 270) }
      #boot .c { display: flex; flex-direction: column; align-items: center }
      #boot .logo {
        width: 76px; height: 76px; border-radius: 21px; margin-bottom: 22px;
        display: flex; align-items: center; justify-content: center;
        background: oklch(0.55 0.16 270); box-shadow: 0 16px 36px -12px oklch(0.55 0.16 270);
      }
      html[data-theme='dark'] #boot .logo {
        background: oklch(0.64 0.15 270); box-shadow: 0 16px 36px -12px oklch(0.64 0.15 270);
      }
      #boot .word { font-weight: 700; font-size: 30px; letter-spacing: -.01em; color: oklch(0.24 0.012 270) }
      html[data-theme='dark'] #boot .word { color: oklch(0.93 0.008 270) }
      #boot .tag { font-weight: 500; font-size: 13px; color: oklch(0.6 0.012 270); margin-top: 10px }
      #boot .bar {
        margin-top: 30px; width: 184px; height: 4px; border-radius: 3px; overflow: hidden;
        position: relative; background: oklch(0.95 0.004 270);
      }
      html[data-theme='dark'] #boot .bar { background: oklch(0.23 0.012 270) }
      #boot .seg {
        position: absolute; height: 100%; width: 38%; border-radius: 3px;
        background: oklch(0.55 0.16 270); animation: boot-load 1.1s ease-in-out infinite;
      }
      html[data-theme='dark'] #boot .seg { background: oklch(0.64 0.15 270) }
      @keyframes boot-load { 0% { transform: translateX(-110%) } 100% { transform: translateX(360%) } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="c">
          <div class="logo">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round">
              <circle cx="9" cy="9" r="6" /><line x1="13.5" y1="13.5" x2="17.5" y2="17.5" />
            </svg>
          </div>
          <div class="word">Scripty</div>
          <div class="tag">Find the scene you came for</div>
          <div class="bar"><div class="seg"></div></div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
